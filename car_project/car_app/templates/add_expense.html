<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    body{
    font-family: Arial, sans-serif;
    background:#f2f4f7;
}


.form-container{

    width:280px;
    margin:100px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.15);

}


form{

    display:flex;
    flex-direction:column;
    gap:12px;

}


input, select{

    padding:10px;
    font-size:14px;
    border:1px solid #ccc;
    border-radius:6px;

}


button{

    padding:10px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;

}


button:hover{

    background:#388e3c;

}
    </style>
</head>
<body>

<div class="form-container">

<form method="post">

{% csrf_token %}

<input type="text" name="title" placeholder="Title">

<input type="number" name="amount" placeholder="Amount">

<select name="category">

<option>Food</option>
<option>Travel</option>
<option>Shopping</option>
<option>Other</option>

</select>

<button type="submit">
Save
</button>

</form>

</div>

</body>
</html>
