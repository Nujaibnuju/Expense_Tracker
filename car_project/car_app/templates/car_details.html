<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ car.name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <div class="row">

        <!-- Car Image -->
        <div class="col-md-6">
            <img src="{{ car.image.url }}" class="img-fluid rounded">
        </div>

        <!-- Car Details -->
        <div class="col-md-6">
            <h2>{{ car.name }}</h2>
            <h4 class="text-success">₹ {{ car.price }}</h4>

            <p class="mt-3">{{ car.description }}</p>

            <ul class="list-group mt-3">
                <li class="list-group-item">Brand: {{ car.brand }}</li>
               
            </ul>

            <a href="{% url 'car_booking' car.id %}" class="btn btn-success mt-4">
                Book Now
            </a>
        </div>

    </div>
</div>



{% if messages %}

    {% for m in messages %}

        <div class="alert alert-success">{{ message }}</div>


    {% endfor %}



{% endif %}

</body>
</html>
