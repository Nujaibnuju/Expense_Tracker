<!DOCTYPE html>
<html>
<head>
    <title>Car Showroom</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
        }

        h1 {
            text-align: center;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            background: white;
            width: 250px;
            margin: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            overflow: hidden;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
        }

        .card-body {
            padding: 15px;
        }

        .price {
            color: green;
            font-weight: bold;
        }

        .btn {
            display: inline-block;
            padding: 8px 12px;
            background: black;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 10px;
        }
    </style>

</head>
<body>

<h1>🚗 Car Showroom</h1>

<div class="container">

    {% for c in car %}
    <div class="card">
        <img src="{{ c.image.url }}" alt="car">

        <div class="card-body">
            <h3>{{ c.name }}</h3>
            <p>{{ c.brand }}</p>
            <p class="price">₹ {{ c.price }}</p>

            <a href="{% url 'car_details' c.id  %}" class="btn">View Details</a>
        </div>
    </div>
    {% endfor %}

</div>

</body>
</html>
